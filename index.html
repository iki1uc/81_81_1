<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>81_81_1</title>
<style>
  body { background:#000; color:#0ff; font-family:monospace; padding:40px; }
  .c { border:1px solid #0ff; padding:20px; width:420px; margin-bottom:20px; }
  h1 { margin:0 0 20px 0; }
  .pulse { animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%{opacity:0.2;} 50%{opacity:1;} 100%{opacity:0.2;} }
</style>
</head>
<body>

<h1>81_81_1 :: Zack‑Klack</h1>

<div class="c">
  <h3>Mandrake‑Move</h3>
  <pre id="out" class="pulse"></pre>
</div>

<script>
// --- 81_81_1 CORE ---
function mandrake() {
  const A = 81;
  const B = 81;
  const G = 1;

  const flow = `${A}_${B}_${G}`;
  const tick = Math.floor(Math.random()*81);

  return {
    flow,
    tick,
    cast: `ZACK‑KLACK → ${flow} :: ${tick}`
  };
}

// --- RENDER ---
function run() {
  const o = document.getElementById("out");
  const m = mandrake();
  o.innerText = m.cast;
}

setInterval(run, 900);
run();
</script>

</body>
</html>
